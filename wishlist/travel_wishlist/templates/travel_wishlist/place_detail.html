{% extends 'travel_wishlist/base.html' %}
{% block content %}

<h2>{{ place.name }}</h2>

{% if place.visited %}
    <p>You have visited {{ place.name }}</p>

{% else %}
    <p>You have NOT visited {{ place.name }}</p>

    <form action="{% url 'place_was_visited' place.pk %}" method="POST">
        {% csrf_token %}
        <button type="sbmit" class="visited">Visited</button>
    </form>

{% endif %}

{% endblock %}
