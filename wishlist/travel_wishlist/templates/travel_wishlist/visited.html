{% extends './base.html' %}
{% block content %}

<h2>PLACES VISITED</h2>

{% if visited_places %}

    <ul>
        {% for place in visited_places %}
        <li><a href="{% url 'place_details' place.pk %}">{{ place.name }}</li>
        {% endfor %}
    </ul>

{% else %}
    <p>no places visited yet</p>

{% endif %}

{% endblock %}
